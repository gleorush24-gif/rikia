[build]
  base = "mobile"
  command = "git clone https://github.com/flutter/flutter.git --depth 1 -b stable && flutter/bin/flutter build web --release"
  publish = "mobile/build/web"

[build.environment]
  PATH = "/opt/build/repo/mobile/flutter/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
